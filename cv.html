<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CV - Elijah Babalola</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Poppins',sans-serif;
    background:#0b0b0f;
    color:white;
}

/* HEADER */
.navbar{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    padding:18px 8%;
    display:flex;
    justify-content:space-between;
    align-items:center;
    z-index:999;
    background:rgba(20,20,25,0.35);
    backdrop-filter:blur(12px);
    border-bottom:1px solid rgba(255,255,255,0.08);
}

.logo{
    font-family:'Playfair Display',serif;
    font-size:18px;
    letter-spacing:2px;
    color:#c6a96b;
}

.nav-links a{
    color:#ddd;
    text-decoration:none;
    margin-left:28px;
    font-size:13px;
    letter-spacing:1px;
    transition:0.3s;
}

.nav-links a:hover{
    color:#c6a96b;
}

/* PAGE HEADER */
.page-header{
    padding:140px 8% 60px;
    text-align:center;
    font-family:'Playfair Display',serif;
    font-size:2.5rem;
    color:#c6a96b;
}

/* CV BUTTONS */
.cv-container{
    display:flex;
    justify-content:center;
    gap:30px;
    flex-wrap:wrap;
    margin-top:50px;
}

.cv-btn{
    text-decoration:none;
    padding:16px 36px;
    border-radius:30px;
    font-size:0.95rem;
    letter-spacing:1px;
    border:1px solid #c6a96b;
    color:#c6a96b;
    transition:0.3s;
}

.cv-btn:hover{
    background:#c6a96b;
    color:black;
    transform:translateY(-2px);
}

/* RESPONSIVE */
@media(max-width:768px){
    .cv-container{
        flex-direction:column;
        align-items:center;
    }
}
</style>

</head>
<body>

<!-- NAVBAR -->
<nav class="navbar">
    <div class="logo">ELIJAH BABALOLA</div>
    <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="index.html#about">About</a>
        <a href="index.html#skills">Skills</a>
        <a href="publications.html">Publications</a>
        <a href="index.html#contact">Contact</a>
    </div>
</nav>

<!-- PAGE HEADER -->
<div class="page-header">Curriculum Vitae</div>

<!-- CV BUTTONS -->
<div class="cv-container">
    <a href="assets/Babalola_Elijah_Olumide_Academic_CV.pdf" class="cv-btn" download>Download Academic CV</a>
    <a href="assets/Babalola_Elijah_Olumide_Professional_CV.pdf" class="cv-btn" download>Download Professional CV</a>
</div>

</body>
</html>
